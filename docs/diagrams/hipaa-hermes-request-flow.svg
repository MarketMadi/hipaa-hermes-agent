<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520" font-family="system-ui, -apple-system, Segoe UI, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <style>
      .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
      .subtitle { font-size: 12px; fill: #64748b; }
      .actor { font-size: 12px; font-weight: 600; fill: #0f172a; }
      .step { font-size: 11px; fill: #334155; }
      .note { font-size: 10px; fill: #64748b; }
      .lifeline { stroke: #cbd5e1; stroke-width: 1.5; stroke-dasharray: 4 4; }
      .msg { stroke: #475569; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
      .box { fill: #f8fafc; stroke: #94a3b8; rx: 6; }
    </style>
  </defs>

  <text x="40" y="36" class="title">Request flow  HIPAA-aligned Hermes</text>
  <text x="40" y="56" class="subtitle">Every path appends to audit log before and after inference</text>

  <!-- Actors -->
  <rect x="40" y="80" width="90" height="36" class="box"/>
  <text x="52" y="103" class="actor">User</text>

  <rect x="200" y="80" width="100" height="36" class="box"/>
  <text x="212" y="103" class="actor">Gateway</text>

  <rect x="370" y="80" width="100" height="36" class="box"/>
  <text x="378" y="103" class="actor">PHI policy</text>

  <rect x="540" y="80" width="90" height="36" class="box"/>
  <text x="552" y="103" class="actor">Agent</text>

  <rect x="700" y="80" width="90" height="36" class="box"/>
  <text x="708" y="103" class="actor">LLM</text>

  <rect x="860" y="80" width="100" height="36" class="box"/>
  <text x="868" y="103" class="actor">Audit log</text>

  <!-- Lifelines -->
  <line x1="85" y1="116" x2="85" y2="480" class="lifeline"/>
  <line x1="250" y1="116" x2="250" y2="480" class="lifeline"/>
  <line x1="420" y1="116" x2="420" y2="480" class="lifeline"/>
  <line x1="585" y1="116" x2="585" y2="480" class="lifeline"/>
  <line x1="745" y1="116" x2="745" y2="480" class="lifeline"/>
  <line x1="910" y1="116" x2="910" y2="480" class="lifeline"/>

  <!-- Messages -->
  <line x1="85" y1="150" x2="250" y2="150" class="msg"/>
  <text x="120" y="142" class="step">1. request</text>

  <line x1="250" y1="180" x2="250" y2="180" class="msg" style="display:none"/>
  <text x="258" y="176" class="step">2. RBAC + allowlist</text>

  <line x1="250" y1="200" x2="910" y2="200" class="msg"/>
  <text x="480" y="192" class="step">3. audit append (ingress)</text>

  <line x1="250" y1="230" x2="420" y2="230" class="msg"/>
  <text x="290" y="222" class="step">4. classify / minimize</text>

  <rect x="300" y="250" width="500" height="56" fill="#fef2f2" stroke="#fca5a5" rx="6"/>
  <text x="312" y="272" class="step">alt: blocked � safe refusal (no LLM call)</text>
  <text x="312" y="290" class="note">PHI pattern or skill ACL deny</text>

  <line x1="420" y1="330" x2="585" y2="330" class="msg"/>
  <text x="460" y="322" class="step">5. minimized context</text>

  <line x1="585" y1="360" x2="745" y2="360" class="msg"/>
  <text x="620" y="352" class="step">6. inference (de-ID only)</text>

  <line x1="745" y1="390" x2="585" y2="390" class="msg"/>
  <text x="620" y="382" class="step">7. response</text>

  <line x1="585" y1="420" x2="910" y2="420" class="msg"/>
  <text x="680" y="412" class="step">8. audit append (model, latency)</text>

  <line x1="585" y1="450" x2="250" y2="450" class="msg"/>
  <text x="360" y="442" class="step">9. reply</text>

  <line x1="250" y1="480" x2="85" y2="480" class="msg"/>
  <text x="120" y="472" class="step">10. deliver</text>
</svg>
