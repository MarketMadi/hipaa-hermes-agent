# Optional local IdP overlay — Keycloak on :8180
# Usage: docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.oidc.yml up -d keycloak
services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.0.7
    network_mode: host
    command: start-dev --import-realm --http-port=8180
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - ./keycloak/hermes-realm.json:/opt/keycloak/data/import/hermes-realm.json:ro
