# Optional local secrets overlay — Vault dev server on :8200
# Usage: docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.vault.yml up -d
services:
  vault:
    image: hashicorp/vault:1.17
    network_mode: host
    cap_add:
      - IPC_LOCK
    environment:
      # LOCAL DEV ONLY — never use -dev mode in dev/prod deployments
      VAULT_DEV_ROOT_TOKEN_ID: hermes-dev-root
      VAULT_DEV_LISTEN_ADDRESS: 127.0.0.1:8200
    command: server -dev
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  vault-agent:
    image: hashicorp/vault:1.17
    network_mode: host
    cap_add:
      - IPC_LOCK
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://127.0.0.1:8200
    volumes:
      - ./vault/agent.hcl:/vault/config/agent.hcl:ro
      - ./vault/hermes-secrets.tpl:/vault/templates/hermes-secrets.tpl:ro
      - ../data/vault/dev-token:/vault/config/dev-token:ro
      - ../data/vault:/vault/secrets
    command: agent -config=/vault/config/agent.hcl
    restart: unless-stopped
