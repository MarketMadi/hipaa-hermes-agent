apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://localhost:9090
    isDefault: true
    editable: false

  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://localhost:3100
    editable: false

  - name: HIPAA Hermes API
    uid: hipaa-hermes-api
    type: yesoreyeram-infinity-datasource
    access: proxy
    url: http://localhost:8090
    editable: false
    jsonData:
      auth_method: headers
      httpHeaderName1: X-Role-Key
    secureJsonData:
      httpHeaderValue1: change-me-auditor
