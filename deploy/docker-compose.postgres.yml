# Optional Postgres overlay for dev/prod audit storage
# Usage: docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.postgres.yml up -d postgres
services:
  postgres:
    image: postgres:16-alpine
    network_mode: host
    command: postgres -p 5433
    environment:
      POSTGRES_USER: hermes
      POSTGRES_PASSWORD: hermes
      POSTGRES_DB: hermes_audit
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hermes -d hermes_audit -p 5433"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
